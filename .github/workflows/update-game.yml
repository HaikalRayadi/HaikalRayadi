name: Update Space Shooter Game

on:
  schedule:
    - cron: '0 0 * * *'  # Berjalan otomatis setiap tengah malam
  workflow_dispatch:  # Mengizinkan tombol klik manual

permissions:
  contents: write

jobs:
  update-game:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2  # Sangat penting agar sistem tidak error

      - uses: czl9707/gh-space-shooter@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          output-path: 'game.gif'
          strategy: 'random'
